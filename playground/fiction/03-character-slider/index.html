<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Lively Talk with Slider</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mundorum/oid/oid.min.css">
  <script type="importmap">
  { "imports": {
      "@mundorum/oid/":         "https://cdn.jsdelivr.net/npm/@mundorum/oid/",
      "@mundorum/collections/": "https://cdn.jsdelivr.net/npm/@mundorum/collections/" }}
  </script>
  <script type="module">
    import '@mundorum/oid/oid.js'
    import '@mundorum/collections/fiction.js'
  </script>
</head>
<body>
  <h1>Lively Talk with Slider</h1>
  <p>That is a lively talk in which the slider updates the value inside speech.
     The X character indicates the position to insert the value.</p>

  <oid-sphere assets="../assets/" stylesheet="https://cdn.jsdelivr.net/npm/@mundorum/oid/oid.min.css">
    <lively-talk-oid
      speech="My age is {{}} years."
      subscribe="show/message~display">
    </lively-talk-oid>
    <slider-oid index publish="initial~show/message;change~show/message">
    </slider-oid>
  </oid-sphere>
</body>
</html>
